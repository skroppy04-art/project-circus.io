<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Server</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    
    background: url("background.jpg") no-repeat center center fixed;
    background-size: cover;

    color: white;
}

.container {
    margin-top:100px;
}

h1 {
    font-size:50px;
}

.ip-box {
    background:#111;
    padding:15px;
    display:inline-block;
    border-radius:10px;
    margin:20px;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#00c3ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background:#0099cc;
}

.status {
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>
<a href="https://discord.com/oauth2/authorize?client_id=1478023326705254582&response_type=code&redirect_uri=https%3A%2F%2Fskroppy04-art.github.io%2Fproject-circus.io%2F&scope=email+identify">
<button>Войти через Discord</button>
</a>

<div class="container">

<h1>🔥 Project Circus</h1>

<div class="ip-box">
    <span id="ip">213.171.18.141:32172</span>
</div>

<br>

<button onclick="copyIP()">Скопировать IP</button>

<div class="status">
    Онлайн: <span id="players">Загрузка...</span>
</div>

<br><br>

<a href="https://discord.gg/Bh5Vhd5D">
<button>Discord</button>
</a>

</div>

<script>
function copyIP() {
    navigator.clipboard.writeText(
        document.getElementById("ip").innerText
    );
    alert("IP скопирован!");
}

// Получение онлайна сервера
fetch("https://api.mcsrvstat.us/2/213.171.18.141:32172")
.then(res => res.json())
.then(data => {
    if(data.online){
        document.getElementById("players")
        .innerText =
        data.players.online + "/" + data.players.max;
    } else {
        document.getElementById("players")
        .innerText = "Сервер оффлайн";
    }
});
</script>

</body>
</html>

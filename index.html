<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prject Circus</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
/* ===== BACKGROUND ===== */
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    color:white;

    background:url("background.jpg") center/cover no-repeat fixed;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:-1;
}

/* ===== NAVBAR ===== */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    background:rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

.logo{
    font-size:24px;
}

.menu a{
    color:white;
    margin-left:25px;
    text-decoration:none;
}

/* ===== HERO ===== */
.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:60px;
    margin:0;
}

.ip-box{
    margin-top:20px;
    padding:15px 30px;
    background:#111;
    border-radius:12px;
    box-shadow:0 0 15px #00c3ff;
}

/* ===== BUTTONS ===== */
button{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00c3ff,#0066ff);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* ===== STATUS CARD ===== */
.status{
    margin-top:30px;
    padding:20px;
    background:rgba(0,0,0,0.5);
    border-radius:15px;
    backdrop-filter:blur(8px);
}

/* ===== FOOTER ===== */
.footer{
    text-align:center;
    padding:20px;
    background:#00000080;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">⚔ Project Circus</div>

<div class="menu">
<a href="#">Главная</a>
<a href="#">Карта</a>
<a href="https://discord.gg/Bh5Vhd5D">Discord</a>
</div>
</div>

<div class="hero">

<h1>Project Circus</h1>

<div class="ip-box">
<span id="ip">213.171.18.141:32172</span>
</div>

<button onclick="copyIP()">Скопировать IP</button>

<div class="status">
Онлайн: <span id="players">...</span><br>

</div>

</div>

<div class="footer">
© 2026 Project Circus
</div>

<script>

function copyIP(){
navigator.clipboard.writeText(
document.getElementById("ip").innerText
);
alert("IP скопирован!");
}

fetch("https://api.mcsrvstat.us/2/213.171.18.141:32172")
.then(r=>r.json())
.then(data=>{
if(data.online){
document.getElementById("players")
.innerText =
data.players.online + "/" + data.players.max;

document.getElementById("ping")
.innerText =
data.debug.ping + " ms";
}else{
document.getElementById("players")
.innerText="Offline";
}
});

</script>

</body>
</html>
